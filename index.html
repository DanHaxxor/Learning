<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discover Zoho</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 640px;
      width: 100%;
      margin: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2.5rem;
    }

    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo h1 {
      font-size: 1.5rem;
      color: #226DB4;
      letter-spacing: -0.5px;
    }

    .logo p {
      color: #718096;
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    .question {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      line-height: 1.4;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .option {
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .option:hover {
      border-color: #226DB4;
      background: #EBF3FB;
    }

    .option.selected {
      border-color: #226DB4;
      background: #EBF3FB;
    }

    .option-icon {
      width: 20px;
      height: 20px;
      border: 2px solid #cbd5e0;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .option.selected .option-icon {
      border-color: #226DB4;
      background: #226DB4;
    }

    .option.selected .option-icon::after {
      content: '';
      width: 8px;
      height: 8px;
      background: #fff;
      border-radius: 50%;
    }

    .option-text {
      font-size: 0.95rem;
    }

    .option-desc {
      font-size: 0.8rem;
      color: #718096;
      margin-top: 0.15rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <img src="zoho-logo.png" alt="Zoho" height="40" style="margin-bottom: 0.75rem;">
        <h1>Discover Zoho</h1>
        <p>Answer a few questions to find your ideal setup</p>
      </div>

      <div class="question">How many people will be using the software?</div>
      <div class="options" id="options-container">
        <div class="option" onclick="select(this)">
          <div class="option-icon"></div>
          <div>
            <div class="option-text">Just me</div>
            <div class="option-desc">Solo freelancer or entrepreneur</div>
          </div>
        </div>
        <div class="option" onclick="select(this)">
          <div class="option-icon"></div>
          <div>
            <div class="option-text">2-10 users</div>
            <div class="option-desc">Small team or startup</div>
          </div>
        </div>
        <div class="option" onclick="select(this)">
          <div class="option-icon"></div>
          <div>
            <div class="option-text">11-50 users</div>
            <div class="option-desc">Growing company</div>
          </div>
        </div>
        <div class="option" onclick="select(this)">
          <div class="option-icon"></div>
          <div>
            <div class="option-text">50+ users</div>
            <div class="option-desc">Established organization</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function select(el) {
      document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
    }
  </script>
</body>
</html>
